# Terminal & Color
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"             # true color for capable term
set -ga terminal-overrides ",st-256colors:Tc"  # explicit Tc for st

# core behavior
set -s escape-time 0
set -g base-index 1
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on

# prefix
unbind C-b
set -g prefix C-Space

# misc bind
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

bind q confirm-before -p "Kill pane? (y/n)" kill-pane
bind Q confirm-before -p "Kill window? (y/n)" kill-window

# Pane resize -- -r makes the bind repeatable without re-pressing prefix
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# quick popup for lazygit - opens over current pane, q closes it
bind g display-popup -E -w 90% -h 90% "lazygit"

# fzf session switcher
bind s display-popup -E "tmux list-sessions | fzf --reverse | cut -d: -f1 | xargs tmux switch-client -t"

# copy mode (vi)

set -g mode-keys vi

bind /   copy-mode \; send-keys "/" # prefix+/ -> copy mode and search forward
bind ?   copy-mode \; send-keys "?" # prefix+? -> copy mode and search backwards
bind [   copy-mode                  # keep default entry point too

bind-key -T copy-mode-vi v    send-keys -X begin-selection
bind-key -T copy-mode-vi C-v  send-keys -X rectangle-toggle           # block selection
bind-key -T copy-mode-vi y    send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y    send-keys -X copy-line                  # yank whole line
bind-key -T copy-mode-vi Escape send-keys -X cancel

# hjkl scroll in copy mode
bind-key -T copy-mode-vi h send-keys -X cursor-left
bind-key -T copy-mode-vi j send-keys -X cursor-down
bind-key -T copy-mode-vi k send-keys -X cursor-up
bind-key -T copy-mode-vi l send-keys -X cursor-right

# word navigation
bind-key -T copy-mode-vi w send-keys -X next-word
bind-key -T copy-mode-vi b send-keys -X previous-word
bind-key -T copy-mode-vi e send-keys -X next-word-end

# jump to top/bottom
bind-key -T copy-mode-vi g send-keys -X history-top
bind-key -T copy-mode-vi G send-keys -X history-bottom

# mouse scrolls enter copy mode automatically
set -g mouse on

# status bar
set -g status on
set -g status-position top
set -g status-interval 5     # refresh every 5s


# themes
#set -g @plugin 'dracula/tmux'
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @theme_variation 'night'
# set -g @plugin 'Nybkox/tmux-kanagawa'
# set -g @kanagawa-theme 'wave'
# set -g @plugin 'nordtheme/nord-tmux'


# List of plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'erlenmeyer316/tmux-tilish' 


# Configure tmux-tilish
set -g @tilish-default 'main-vertical'
set -g @tilish-dmenu 'on'

# Install 'tpm' if needed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialiize tmux plugin manager
run '~/.tmux/plugins/tpm/tpm'
