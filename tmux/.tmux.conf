# ══════════════════════════════════════════════════════════════════
# TERMINAL & COLOR
# ══════════════════════════════════════════════════════════════════

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"                     # true color for capable terms
set -ga terminal-overrides ",st-256color:Tc"           # explicit Tc for st

# ══════════════════════════════════════════════════════════════════
# CORE BEHAVIOR
# ══════════════════════════════════════════════════════════════════

set -s escape-time 0           # eliminate ESC delay — critical for neovim
set -g base-index 1            # windows number from 1
set -g pane-base-index 1       # panes number from 1
set -g renumber-windows on     # close window 2 of 3 → becomes 2 of 2, not 1,3
set -g focus-events on         # let neovim detect focus (triggers autoread, etc.)
set -g history-limit 50000     # big scrollback buffer
set -g set-clipboard on        # OSC 52 passthrough to terminal (needed for tmux-yank fallback)

# ══════════════════════════════════════════════════════════════════
# PREFIX
# ══════════════════════════════════════════════════════════════════

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix       # double C-Space sends a literal C-Space to the app

# ══════════════════════════════════════════════════════════════════
# MISC BINDS
# ══════════════════════════════════════════════════════════════════

unbind r
bind r source-file ~/.tmux.conf \; display "  tmux.conf reloaded"

bind q confirm-before -p "Kill pane? (y/n)" kill-pane
bind Q confirm-before -p "Kill window? (y/n)" kill-window

# New window / splits retaining current working directory
bind c new-window      -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane resize — -r makes the bind repeatable without re-pressing prefix
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Quick popup for lazygit — opens over current pane, q closes it
bind g display-popup -E -w 90% -h 90% "lazygit"

# fzf session switcher
bind s display-popup -E "tmux list-sessions | fzf --reverse | cut -d: -f1 | xargs tmux switch-client -t"

# ══════════════════════════════════════════════════════════════════
# COPY MODE (vi)
# ══════════════════════════════════════════════════════════════════

set -g mode-keys vi

bind /   copy-mode \; send-keys "/"    # prefix+/ → copy mode and immediately search forward
bind ?   copy-mode \; send-keys "?"    # prefix+? → copy mode and search backward
bind [   copy-mode                     # keep default entry point too

bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi C-v   send-keys -X rectangle-toggle   # block selection
bind-key -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y     send-keys -X copy-line           # yank whole line
bind-key -T copy-mode-vi Escape send-keys -X cancel

# hjkl scroll in copy mode
bind-key -T copy-mode-vi h send-keys -X cursor-left
bind-key -T copy-mode-vi j send-keys -X cursor-down
bind-key -T copy-mode-vi k send-keys -X cursor-up
bind-key -T copy-mode-vi l send-keys -X cursor-right

# Word navigation
bind-key -T copy-mode-vi w send-keys -X next-word
bind-key -T copy-mode-vi b send-keys -X previous-word
bind-key -T copy-mode-vi e send-keys -X next-word-end

# Jump to top/bottom
bind-key -T copy-mode-vi g send-keys -X history-top
bind-key -T copy-mode-vi G send-keys -X history-bottom

# Mouse scrolls enter copy mode automatically
set -g mouse on

# ══════════════════════════════════════════════════════════════════
# PANE BORDERS & LABELS
# ══════════════════════════════════════════════════════════════════

set -g pane-border-status top                               # show label bar at top of each pane
set -g pane-border-format " #{pane_index}:#{pane_title} "  # index + title (title = running cmd by default)
set -g pane-border-lines single

# Dracula: comment=#6272a4  purple=#bd93f9
set -g pane-border-style        "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

# ══════════════════════════════════════════════════════════════════
# TILING — i3-style, Alt-key driven, no prefix required
# ══════════════════════════════════════════════════════════════════

# ── Pane focus ───────────────────────────────────────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane swap (move pane in direction) ───────────────────────────
bind -n M-H swap-pane -s '{left-of}'
bind -n M-J swap-pane -s '{down-of}'
bind -n M-K swap-pane -s '{up-of}'
bind -n M-L swap-pane -s '{right-of}'

# ── Split (vertical only — one layout direction, like i3) ────────
bind -n M-Enter split-window -h -c "#{pane_current_path}"

# ── Close pane ───────────────────────────────────────────────────
bind -n M-q confirm-before -p "Kill pane? (y/n)" kill-pane

# ── Window switching (Alt+1-9) ───────────────────────────────────
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# ── Move pane to window N, i3-style (Alt+Shift+1-9) ─────────────
bind -n M-! run-shell "tmux-move-pane-to-window 1"
bind -n M-@ run-shell "tmux-move-pane-to-window 2"
bind -n M-# run-shell "tmux-move-pane-to-window 3"
bind -n M-$ run-shell "tmux-move-pane-to-window 4"
bind -n M-% run-shell "tmux-move-pane-to-window 5"
bind -n M-^ run-shell "tmux-move-pane-to-window 6"
bind -n M-& run-shell "tmux-move-pane-to-window 7"
bind -n M-* run-shell "tmux-move-pane-to-window 8"
bind -n M-( run-shell "tmux-move-pane-to-window 9"

# ── Layout management (under prefix — infrequent use) ────────────
bind = select-layout -E                             # rebalance/equalize pane sizes
bind Space next-layout                              # cycle through layouts
bind M-1 select-layout main-vertical               # one tall pane left, rest stacked right
bind M-2 select-layout main-horizontal             # one wide pane top, rest stacked below
bind M-3 select-layout tiled                       # equal grid

# ── Auto-rebalance on split ──────────────────────────────────────
set-hook -g after-split-window "select-layout main-vertical"

# ══════════════════════════════════════════════════════════════════
# STATUS BAR (Dracula)
# ══════════════════════════════════════════════════════════════════
# Dracula palette reference:
#   bg=#282a36  current-line=#44475a  fg=#f8f8f2
#   comment=#6272a4  cyan=#8be9fd  green=#50fa7b
#   orange=#ffb86c  pink=#ff79c6  purple=#bd93f9
#   red=#ff5555  yellow=#f1fa8c

set -g status on
set -g status-position top
set -g status-interval 5                               # refresh every 5s
set -g status-style "bg=#282a36,fg=#f8f8f2"

# Left side: session name
set -g status-left-length 30
set -g status-left "#[bg=#bd93f9,fg=#282a36,bold] 󰔯 #S #[bg=#282a36,fg=#bd93f9]\

# Window list (tabs)
set -g window-status-separator ""
set -g window-status-format         "#[fg=#6272a4,bg=#282a36]  #I:#W  "
set -g window-status-current-format "#[fg=#282a36,bg=#44475a] #[fg=#f8f8f2,bold]#I:#W #[fg=#44475a,bg=#282a36]"

# Right side: prefix indicator | git branch | clock | date
set -g status-right-length 100
set -g status-right "\
#{?client_prefix,#[fg=#ff79c6,bold] ⌨  PREFIX ,}\
#[fg=#50fa7b] #(cd '#{pane_current_path}' && git branch --show-current 2>/dev/null | sed 's/.*/  &/')\
#[fg=#6272a4]  │  \
#[fg=#8be9fd]󰥔 %H:%M\
#[fg=#6272a4]  │  \
#[fg=#f1fa8c]%a %d %b"

# ══════════════════════════════════════════════════════════════════
# PLUGINS
# ══════════════════════════════════════════════════════════════════

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'


# tmux-yank
# xclip used when X11 present; OSC52 fallback otherwise
set -g @yank_selection         'clipboard'      # X11 CLIPBOARD (Ctrl+V), not PRIMARY (middle-click)
set -g @yank_selection_mouse   'clipboard'
set -g @yank_action            'copy'           # stay in copy mode after yanking (don't exit)

# ══════════════════════════════════════════════════════════════════
# BOOTSTRAP TPM
# ══════════════════════════════════════════════════════════════════

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
