# Moonfly theme for lazygit
# Full config.yml — your existing file was empty, so this includes
# a sensible baseline config alongside the theme block.
#
# Place at: ~/.config/lazygit/config.yml
# (stow path: stow/lazygit/.config/lazygit/config.yml)

gui:
  # Theme — all colors are hex strings; attribute strings go alongside
  theme:
    # Active pane border — moonfly primary blue, bold
    activeBorderColor:
      - '#80a0ff'
      - bold
    # Inactive pane borders — dark surface, barely visible
    inactiveBorderColor:
      - '#323437'
    # Border color when in search mode
    searchingActiveBorderColor:
      - '#79dac8' # cyan
      - bold
    # Bottom options text (keybind hints)
    optionsTextColor:
      - '#74b2ff' # br_blue — readable but not dominant
    # Selected line background in lists
    selectedLineBgColor:
      - '#1a1a1a' # slightly lifted above #080808 bg
    # Selected line with no background support (fallback)
    selectedRangeBgColor:
      - '#323437' # surface
    # Cherry-picked commits
    cherryPickedCommitBgColor:
      - '#323437'
    cherryPickedCommitFgColor:
      - '#cf87e8' # magenta
    # Unstaged/untracked changes — red
    unstagedChangesColor:
      - '#ff5454'
    # Default foreground (branch names, file names, etc.)
    defaultFgColor:
      - '#bdbdbd'
  # Nerd Font support — use icons in the UI
#  nerdFontsVersion: "3"
  # Mouse disabled — keyboard-driven workflow
#  mouseEvents: false
  # Side panel width (proportion of screen)
